name: pr-digest
version: "1.0"
description: "Fetch GitHub PRs, summarize with Claude, and send digest to Slack"

triggers:
  - type: manual
  - type: cron
    schedule: "0 9 * * *"

nodes:
  fetch-prs:
    path: ./nodes/fetch-prs.ts
  analyze-prs:
    path: ./nodes/analyze-prs.ts
  notify-slack:
    path: ./nodes/notify-slack.ts

edges:
  - from: fetch-prs
    to: analyze-prs
  - from: analyze-prs
    to: notify-slack

config:
  timeout: 60s
  retries: 1

contract:
  version: "1"
  dependencies:
    github:
      protocol: https
      host: api.github.com
      port: 443
      auth:
        type: bearer-token
        secret: github.token
    anthropic:
      protocol: https
      host: api.anthropic.com
      port: 443
      auth:
        type: api-key
        secret: anthropic.api_key
    slack:
      protocol: https
      host: hooks.slack.com
      port: 443
      auth:
        type: webhook-url
        secret: slack.webhook_url
